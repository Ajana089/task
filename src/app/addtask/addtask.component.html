<div class="container">


    <div class="heading">
        <h3>Adding Tasks</h3>
    </div>

    <div class="registratio">

        <form [formGroup]="TaskForm" 
          (ngSubmit)="onSubmit()">
        <div>
       <mat-form-field>
  <mat-label>Title</mat-label>
  <input matInput formControlName="title">
  
</mat-form-field>
    </div>

    <div>
<mat-form-field>
  <mat-label>Description</mat-label>
  <textarea matInput formControlName="description"></textarea>
   
</mat-form-field>

</div>

<div>
    <mat-form-field>
  <mat-label>Staring Date</mat-label>
  <input matInput [matDatepicker]="picker" formControlName="date">
  <mat-hint>MM/DD/YYYY</mat-hint>
  <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-datepicker #picker></mat-datepicker>
  
</mat-form-field>
</div>
<div *ngIf="userid">
    <mat-form-field>
  <mat-label>Completed Date</mat-label>
  <input matInput [matDatepicker]="picker1" formControlName="completedate">
  <mat-hint>MM/DD/YYYY</mat-hint>
  <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
  <mat-datepicker #picker1></mat-datepicker>
   
</mat-form-field>
</div>




   
<div *ngIf="userid">
    <mat-form-field>
      <mat-label>Select an option</mat-label>
  <mat-select [(value)]="selected" formControlName="status">
   
    <mat-option value="Pending">Pending</mat-option>
    <mat-option value="Completed">Completed</mat-option>
   
  </mat-select>
  
</mat-form-field>
</div>


<div>
    <button mat-raised-button  type="submit">
         Submit</button>
 </div>

  </form>


    </div>

    
</div>
